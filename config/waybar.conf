{
    "layer": "top",
    /*"position": "bottom",*/
    "height": 22,
    "spacing": 0,
    "modules-left": ["custom/arch", "custom/arrow-left", "sway/workspaces"],
    "modules-center": ["sway/window"],
    "modules-right": [
        "custom/arrow-start", "custom/idle", "pulseaudio#mic", 
        "custom/arrow1", "backlight", 
        "custom/arrow2", "network", "bluetooth", 
        "custom/arrow3", "pulseaudio", 
        "custom/arrow4", "clock", 
        "custom/arrow5", "battery"
    ],

    "custom/arch": { 
        "format": " ARCH ",
        "tooltip-format": " Kavatron v8 "
    },
    
    "custom/idle": {
        "format": " {} ",
        "exec": "pgrep swayidle > /dev/null && echo '-' || echo '~'",
        "on-click": "idleToggle",
        "tooltip-format": "Parabéns, você achou um Easter-Egg!",
        "interval": 5
    },

    "pulseaudio#mic": {
        "format": "{format_source}",
        "format-source": "  ",
        "format-source-muted": "  ",
        "on-click": "wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle"
    },

    "backlight": {
        "format": " 󰃠 {percent}% "
    },

       "network": {
        "format": "   {essid} ",
        "on-click": "foot nmtui"
    }, 

    "bluetooth": {
        "format": "  {status} ",
        "format-connected": "  {device_alias} ",
        "format-connected-battery": "  {device_alias} {device_battery_percentage}% ",
        "format-device-preference": [ "device1", "device2" ], 
        "tooltip-format": "{controller_alias}\t{controller_address}\n\n{num_connections} conectado",
        "tooltip-format-connected": "{controller_alias}\t{controller_address}\n\n{num_connections} conectado\n\n{device_enumerate}",
        "tooltip-format-enumerate-connected": "{device_alias}\t{device_address}",
        "tooltip-format-enumerate-connected-battery": "{device_alias}\t{device_address}\t{device_battery_percentage}%",
        "on-click": "foot bluetoothctl"
    },

    "pulseaudio": { 
        "format": " 🔊 {volume}% ",
        "format-muted": " 🔇 {volume}% ",
        "on-click": "wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle"
    },

    "clock": {
        "interval": 60,
        "locale": "pt_BR.UTF-8",
        "format": " {:%a | %d-%m-%Y | %H:%M} ",
        "tooltip-format": "<tt><small>{calendar}</small></tt>"
    },

    "battery": {
        "format": " {icon} {capacity}% ", 
        "format-charging": " ⚡ {capacity}% ",
        "format-icons": ["💀", "❗", "🪫", "🌑", "🌘", "🌗", "🌖", "🌕"] 
    },

    "custom/arrow-left": { "format": "", "tooltip": false },
    "custom/arrow-start": { "format": "", "tooltip": false },
    "custom/arrow1": { "format": "", "tooltip": false },
    "custom/arrow2": { "format": "", "tooltip": false },
    "custom/arrow3": { "format": "", "tooltip": false },
    "custom/arrow4": { "format": "", "tooltip": false },
    "custom/arrow5": { "format": "", "tooltip": false }
}
