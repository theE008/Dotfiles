# --- Variables ---
set $mod Mod4
set $alt Mod1
set $term foot tmux
set $menu dmenu_path | dmenu | xargs swaymsg exec --

# --- Opacity ---
# Applying transparency only to the terminal as is standard
set $opacity 0.85
for_window [app_id="foot"] opacity $opacity

# --- Input Configuration ---
# ABNT2 Keyboard Setup
input "type:keyboard" {
    xkb_layout br
    xkb_variant abnt2
}

# Fix for inverted scrolling
input "type:touchpad" {
    tap enabled
    natural_scroll disabled
    middle_emulation enabled
}

# --- Output Configuration ---
output eDP-1 res 1920x1080@60Hz bg #282828 solid_color

# --- Visuals ---
client.focused          #5e315b #5e315b #e8e8e8 #5e315b   #5e315b
exec_always swaybg -i ~/Pictures/background.png -m fill
default_border pixel 2
gaps inner 10
gaps outer 5

# --- Keybindings ---
bindsym $mod+Return exec $term
bindsym $mod+Shift+q kill
bindsym $mod+d exec $menu
bindsym $mod+Shift+c reload
bindsym $mod+Shift+e exec swaynag -t warning -m 'Exit Sway?' -b 'Yes' 'swaymsg exit'
bindsym Print exec ~/bin/shot
bindsym $mod+question exec foot --title="hotkeys-popup" sh -c "cat ~/.config/sway/hotkeys.txt; read"

# Make the hotkeys popup float
for_window [title="hotkeys-popup"] floating enable, resize set 600 400, move position center

# Volume Keys (Pipewire/Wireplumber)
bindsym XF86AudioRaiseVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindsym XF86AudioLowerVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindsym XF86AudioMute exec wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# F11: Toggle Mic Mute
bindsym F11 exec wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
#
# Brightness Keys
bindsym XF86MonBrightnessUp exec brightnessctl set +5%
bindsym XF86MonBrightnessDown exec brightnessctl set 5%-

# Blackout Screen Toggle
bindsym $mod+F11 exec swaymsg "output * power toggle"

# Movement (Vim-style focus)
bindsym $mod+h focus left
bindsym $mod+j focus down
bindsym $mod+k focus up
bindsym $mod+l focus right

# Move focused window around the screen
bindsym $mod+Shift+h move left
bindsym $mod+Shift+j move down
bindsym $mod+Shift+k move up
bindsym $mod+Shift+l move right

# Window Splitting (Up/Down vs Left/Right)
bindsym $mod+v split v
bindsym $mod+b split h

# Workspaces (Standard)
bindsym $mod+1 workspace number 1
bindsym $mod+2 workspace number 2
bindsym $mod+3 workspace number 3
bindsym $mod+4 workspace number 4
bindsym $mod+Shift+1 move container to workspace number 1
bindsym $mod+Shift+2 move container to workspace number 2

# Workspaces (DWL-style Alt switching)
bindsym $alt+j workspace prev
bindsym $alt+k workspace next

# --- The Bar (Time & Battery) ---
bar {
    swaybar_command waybar
}

# --- Autostart ---
exec idle-toggle
