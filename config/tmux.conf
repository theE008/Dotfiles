# ==============================================================================
# TMUX CONFIGURATION - MINIMALIST WORKFLOW EDITION
# ==============================================================================

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# --- THE COLOR OVERKILL FIX ---
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",foot:Tc"
set-option -ga terminal-overrides ",foot:RGB"
set-option -a terminal-features 'foot:RGB'
set -as terminal-overrides ',*:SetDefaultBG=^[[49m'

# --- 2. Core Logic ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on

# --- 3. Key Bindings (Keep your QoL) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- 4. Visuals (Simplified Tactical) ---
set -g status-interval 2
set -g status-justify left
set -g status-style bg="#121212",fg="#e8e8e8"

# Pane Borders (Alive Purple for active focus)
set -g pane-border-style fg="#1a1a1a"
set -g pane-active-border-style fg="#5e315b"

# Message Text
set -g message-style bg="#5e315b",fg="#e8e8e8",bold

# --- 5. Status Left: [ SESSION ] ---
# We keep it simple: Current session name in a dark purple block
set -g status-left-length 60
set -g status-left "#[fg=#121212,bg=#5e315b,bold] #S #[fg=#5e315b,bg=#121212,nobold] "

# Right Side: User @ Host | Path
set -g status-right-length 150
set -g status-right "#[fg=#1a1a1a,bg=default]#[fg=#585858,bg=#1a1a1a]  #(whoami) #[fg=#251b3a,bg=#1a1a1a]#[fg=#e8e8e8,bg=#251b3a]  #{=30:pane_current_path} "

# Active Window: Clean Purple Underline look
set -g window-status-current-format "#[fg=#121212,bg=#3d2b56]#[fg=#e8e8e8,bg=#3d2b56,bold] #I:#W #[fg=#3d2b56,bg=#121212,nobold]"

# Inactive Windows: Just the number and name, muted
set -g window-status-format "#[fg=#585858,bg=#121212]  #I:#W  "

# Activity Alert
setw -g monitor-activity on
set -g window-status-activity-style fg="#ff9e3b",bg="#121212"

# --- Initialize TPM ---
run '~/.tmux/plugins/tpm/tpm'
